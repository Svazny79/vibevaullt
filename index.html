<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeVault™</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 24px;
  background: linear-gradient(90deg,#ff00cc,#3333ff);
}

.container {
  padding: 20px;
  text-align: center;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

.profile img {
  width: 120px;
  border-radius: 50%;
}

.stories {
  display: grid;
  grid-template-columns: repeat(auto-fill,120px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.story img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">VibeVault™</div>

<div class="container" id="app"></div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
let loggedOutMode = false;

function renderStart() {
  const app = document.getElementById("app");

  if (!user) {
    app.innerHTML = `
      <h2>Create Account</h2>
      <input id="username" placeholder="Username"><br>
      <input id="password" type="password" placeholder="Password"><br>
      <button onclick="createAccount()">Sign Up</button>
      <br><br>
      <button onclick="stayLoggedOut()">Stay Logged Out</button>
    `;
  } else {
    renderProfile();
  }
}

function createAccount() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  user = {
    username,
    password,
    stories: [],
    followers: [],
    following: [],
    private: false
  };

  localStorage.setItem("user", JSON.stringify(user));
  renderProfile();
}

function stayLoggedOut() {
  loggedOutMode = true;
  renderProfile();
}

function renderProfile() {
  const app = document.getElementById("app");

  if (loggedOutMode) {
    app.innerHTML = `
      <h2>Viewer Mode 👀</h2>
      <p>You cannot follow or post</p>
      <button onclick="location.reload()">Go Back</button>
    `;
    return;
  }

  app.innerHTML = `
    <div class="profile">
      <img src="https://via.placeholder.com/120">
      <h2>@${user.username}</h2>
      <p>${user.private ? "🔒 Private Account" : "🌍 Public Account"}</p>

      <button onclick="togglePrivacy()">Toggle Privacy</button>
      <button onclick="followSelf()">+ Follow (demo)</button>
    </div>

    <h3>Upload Story</h3>
    <input type="file" id="fileInput">

    <div class="stories" id="stories"></div>
  `;

  document.getElementById("fileInput").addEventListener("change", uploadStory);

  renderStories();
}

function togglePrivacy() {
  user.private = !user.private;
  saveUser();
  renderProfile();
}

function followSelf() {
  user.followers.push("demoUser");
  saveUser();
  alert("Someone followed you 😎");
}

function uploadStory(e) {
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  user.stories.push(url);
  saveUser();
  renderStories();
}

function renderStories() {
  const storiesDiv = document.getElementById("stories");
  storiesDiv.innerHTML = "";

  user.stories.forEach(s => {
    const div = document.createElement("div");
    div.className = "story";

    const img = document.createElement("img");
    img.src = s;

    div.appendChild(img);
    storiesDiv.appendChild(div);
  });
}

function saveUser() {
  localStorage.setItem("user", JSON.stringify(user));
}

renderStart();
</script>

</body>
</html>
