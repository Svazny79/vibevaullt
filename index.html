<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VibeVault™</title>

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white;}
.header {text-align:center;padding:15px;font-size:24px;background:linear-gradient(90deg,#ff00cc,#3333ff);}
.container {padding:20px;text-align:center;}
input,button {padding:8px;margin:5px;border-radius:8px;border:none;}
.userCard {background:#222;padding:10px;margin:10px;border-radius:10px;cursor:pointer;}
.profile img {width:120px;border-radius:50%;}
.story {width:120px;margin:5px;border-radius:10px;cursor:pointer;}
.modal {position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;flex-direction:column;align-items:center;justify-content:center;}
</style>
</head>

<body>

<div class="header">VibeVault™</div>
<div class="container" id="app"></div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let viewerMode = false;

/* ---------- FAKE USERS ---------- */
if(users.length===0){
users=[
{username:"mike123",password:"123",bio:"🏀 Basketball life",private:false,followers:[],following:[],requests:[],stories:[],notifications:[],fake:true},
{username:"lisa_vibes",password:"123",bio:"☕ Coffee & aesthetic",private:true,followers:[],following:[],requests:[],stories:[],notifications:[],fake:true},
{username:"pro_gamer",password:"123",bio:"🎮 Gaming clips",private:false,followers:[],following:[],requests:[],stories:[],notifications:[],fake:true}
];
saveUsers();
}

/* ---------- START ---------- */
function renderStart(){
if(!currentUser && !viewerMode){
app.innerHTML=`
<h2>Welcome</h2>
<input id="u" placeholder="Username"><br>
<input id="p" type="password" placeholder="Password"><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button><br>
<button onclick="viewer()">Stay Logged Out</button>
`;
}else renderSearch();
}

/* ---------- AUTH ---------- */
function signup(){
const u=uEl.value,p=pEl.value;
const newUser={username:u,password:p,bio:"New user ✨",private:false,followers:[],following:[],requests:[],stories:[],notifications:[],fake:false};
users.push(newUser);
currentUser=newUser;
saveAll();
renderSearch();
}
function login(){
const f=users.find(x=>x.username===uEl.value&&x.password===pEl.value);
if(f){currentUser=f;saveCurrent();renderSearch();}else alert("Not found");
}
function viewer(){viewerMode=true;renderSearch();}

/* ---------- SEARCH ---------- */
function renderSearch(){
const sorted=[...users].sort((a,b)=>b.followers.length-a.followers.length);
app.innerHTML=`
<h2>Search</h2>
<input placeholder="Search..." oninput="search(this.value)">
<button onclick="viewNotifications()">🔔</button>
<div id="results"></div>
`;
showUsers(sorted);
}
function search(q){
showUsers(users.filter(u=>u.username.includes(q)));
}
function showUsers(list){
results.innerHTML="";
list.forEach(u=>{
results.innerHTML+=`
<div class="userCard" onclick="viewProfile('${u.username}')">
<h3>@${u.username}</h3>
<p>${u.bio}</p>
</div>`;
});
}

/* ---------- PROFILE ---------- */
function viewProfile(name){
const u=users.find(x=>x.username===name);
let canView=!u.private||(currentUser&&currentUser.following.includes(name));

let html=`
<button onclick="renderSearch()">⬅</button>
<div class="profile">
<img src="${u.pic||'https://via.placeholder.com/120'}">
<h2>@${u.username}</h2>
<p>${u.bio}</p>
<p>${u.private?"🔒 Private":"🌍 Public"}</p>
</div>
`;

if(!viewerMode && currentUser && currentUser.username!==name){
html+=`<button onclick="follow('${name}')">Follow</button>`;
}

if(currentUser && currentUser.username===name){
html+=`
<br><button onclick="editProfile()">Edit Profile</button>
<input type="file" onchange="uploadStory(event)">
`;
}

if(canView){
let stories = u.fake ? generateStories(u) : u.stories;

html+=`<h3>Stories</h3>`;
stories.forEach((s,i)=>{
html+=`<img class="story" src="${s}" onclick="openStory('${name}',${i})">`;
});
}else html+=`<p>Private account</p>`;

app.innerHTML=html;
}

/* ---------- STORIES ---------- */
function uploadStory(e){
const url=URL.createObjectURL(e.target.files[0]);
currentUser.stories.push({url,likes:[],comments:[]});
saveAll();
}
function openStory(name,i){
const u=users.find(x=>x.username===name);
let s=u.fake?{url:generateStories(u)[i],likes:[],comments:[]} : u.stories[i];

app.innerHTML=`
<div class="modal">
<img src="${s.url}" style="max-width:90%">
<button onclick="likeStory('${name}',${i})">❤️ ${s.likes.length}</button>
<div>${s.comments.map(c=>`<p>${c}</p>`).join("")}</div>
<input id="c"><button onclick="comment('${name}',${i})">Send</button>
<button onclick="viewProfile('${name}')">Close</button>
</div>
`;
}
function likeStory(name,i){
const u=users.find(x=>x.username===name);
if(u.fake)return;

let s=u.stories[i];
if(!s.likes.includes(currentUser.username)){
s.likes.push(currentUser.username);
u.notifications.push(currentUser.username+" liked your story");
}
saveAll();
openStory(name,i);
}
function comment(name,i){
const u=users.find(x=>x.username===name);
if(u.fake)return;

let s=u.stories[i];
s.comments.push(currentUser.username+": "+c.value);
u.notifications.push(currentUser.username+" commented");
saveAll();
openStory(name,i);
}

/* ---------- FOLLOW ---------- */
function follow(name){
const t=users.find(u=>u.username===name);

if(t.fake){
currentUser.following.push(name);
t.followers.push(currentUser.username);
}else{
t.requests.push(currentUser.username);
t.notifications.push("New follow request");
alert("Request sent");
}
saveAll();
}

/* ---------- EDIT ---------- */
function editProfile(){
app.innerHTML=`
<h2>Edit</h2>
<input id="bio" placeholder="New bio">
<input type="file" onchange="uploadPic(event)">
<button onclick="saveProfile()">Save</button>
`;
}
function uploadPic(e){
currentUser.pic=URL.createObjectURL(e.target.files[0]);
}
function saveProfile(){
currentUser.bio=bio.value;
saveAll();
renderSearch();
}

/* ---------- NOTIFICATIONS ---------- */
function viewNotifications(){
let html=`<h2>Notifications</h2><button onclick="renderSearch()">Back</button>`;
currentUser.notifications.forEach(n=>html+=`<p>${n}</p>`);
app.innerHTML=html;
}

/* ---------- FAKE STORY GEN ---------- */
function generateStories(u){
if(u.bio.includes("Basketball")) return ["https://picsum.photos/200?basketball","https://picsum.photos/200?gym"];
if(u.bio.includes("Coffee")) return ["https://picsum.photos/200?coffee","https://picsum.photos/200?aesthetic"];
if(u.bio.includes("Gaming")) return ["https://picsum.photos/200?gaming","https://picsum.photos/200?setup"];
return ["https://picsum.photos/200?random"];
}

/* ---------- STORAGE ---------- */
function saveUsers(){localStorage.setItem("users",JSON.stringify(users));}
function saveCurrent(){localStorage.setItem("currentUser",JSON.stringify(currentUser));}
function saveAll(){saveUsers();saveCurrent();}

/* ---------- INIT ---------- */
const app=document.getElementById("app");
const uEl=document.getElementById("u");
const pEl=document.getElementById("p");

renderStart();
</script>

</body>
</html>
