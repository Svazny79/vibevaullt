<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VibeVault™</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;}
.header{text-align:center;padding:15px;font-size:24px;background:linear-gradient(90deg,#ff00cc,#3333ff);}
.container{text-align:center;padding:20px;}
button,input{padding:8px;margin:5px;border-radius:8px;border:none;}
.card{background:#222;padding:10px;margin:10px;border-radius:10px;}
.profile img{width:120px;border-radius:50%;}
.story{width:110px;margin:5px;border-radius:10px;cursor:pointer;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;flex-direction:column;align-items:center;justify-content:center;}
</style>
</head>

<body>

<div class="header">VibeVault™</div>
<div id="app" class="container"></div>

<script>
const app = document.getElementById("app");

/* ---------- DATA ---------- */
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

/* ---------- INIT FAKE USERS ---------- */
if(users.length===0){
users=[
{username:"mike123",bio:"🏀 Basketball life",followers:[],following:[],requests:[],stories:[],private:false,fake:true},
{username:"lisa_vibes",bio:"☕ Coffee & aesthetic",followers:[],following:[],requests:[],stories:[],private:true,fake:true},
{username:"pro_gamer",bio:"🎮 Gaming clips",followers:[],following:[],requests:[],stories:[],private:false,fake:true}
];
saveUsers();
}

/* ---------- START ---------- */
function start(){
if(!currentUser){
currentUser={
username:"new_user",
bio:"Edit your bio ✨",
followers:[],
following:[],
requests:[],
stories:[],
private:false,
fake:false
};
saveCurrent();
}
renderHome();
}

/* ---------- HOME ---------- */
function renderHome(){
app.innerHTML=`
<div class="profile">
<img src="${currentUser.pic||'https://via.placeholder.com/120'}">
<h2>@${currentUser.username}</h2>
<p>${currentUser.bio}</p>
<p>${currentUser.private?"🔒 Private":"🌍 Public"}</p>

<button onclick="editProfile()">Edit</button>
<button onclick="togglePrivate()">Privacy</button>
<button onclick="openSearch()">🔍 Search</button>
<button onclick="viewRequests()">📩 (${currentUser.requests.length})</button>

<br><br>
<input type="file" onchange="uploadStory(event)">
</div>

<h3>Your Stories</h3>
<div>
${currentUser.stories.map((s,i)=>`<img class="story" src="${s.url}" onclick="openStory('${currentUser.username}',${i})">`).join("")}
</div>
`;
}

/* ---------- EDIT ---------- */
function editProfile(){
app.innerHTML=`
<h2>Edit Profile</h2>
<input id="name" placeholder="Username">
<input id="bio" placeholder="Bio">
<input type="file" onchange="uploadPic(event)">
<br>
<button onclick="saveProfile()">Save</button>
`;
}

function uploadPic(e){
currentUser.pic = URL.createObjectURL(e.target.files[0]);
}

function saveProfile(){
let nameInput = document.getElementById("name").value;
let bioInput = document.getElementById("bio").value;

if(nameInput) currentUser.username = nameInput;
if(bioInput) currentUser.bio = bioInput;

saveAll();
renderHome();
}

/* ---------- SEARCH ---------- */
function openSearch(){
let sorted=[...users].sort((a,b)=>b.followers.length-a.followers.length);

app.innerHTML=`
<h2>Search</h2>
<input placeholder="Search..." oninput="searchUsers(this.value)">
<button onclick="renderHome()">⬅ Back</button>
<div id="results"></div>
`;

displayUsers(sorted);
}

function searchUsers(q){
displayUsers(users.filter(u=>u.username.toLowerCase().includes(q.toLowerCase())));
}

function displayUsers(list){
let results = document.getElementById("results");
results.innerHTML="";

list.forEach(u=>{
results.innerHTML+=`
<div class="card">
<h3>@${u.username}</h3>
<p>${u.bio}</p>
<button onclick="viewProfile('${u.username}')">View</button>
</div>
`;
});
}

/* ---------- VIEW PROFILE ---------- */
function viewProfile(name){
let u = users.find(x=>x.username===name);
let canView = !u.private || currentUser.following.includes(name);

let html=`
<button onclick="openSearch()">⬅ Back</button>
<div class="profile">
<img src="${u.pic||'https://via.placeholder.com/120'}">
<h2>@${u.username}</h2>
<p>${u.bio}</p>
<p>${u.private?"🔒 Private":"🌍 Public"}</p>
</div>
`;

if(currentUser.username!==name){
html+=`<button onclick="follow('${name}')">Follow</button>`;
}

if(canView){
let stories = u.fake ? generateStories(u) : u.stories;

html+=`<h3>Stories</h3>`;
stories.forEach((s,i)=>{
let src = u.fake ? s : s.url;
html+=`<img class="story" src="${src}" onclick="openStory('${name}',${i})">`;
});
}else{
html+=`<p>Private account</p>`;
}

app.innerHTML=html;
}

/* ---------- FOLLOW ---------- */
function follow(name){
let t=users.find(u=>u.username===name);

if(t.fake){
currentUser.following.push(name);
t.followers.push(currentUser.username);
alert("Followed + they followed back 🤖");
}else{
t.requests.push(currentUser.username);
alert("Request sent 📩");
}

saveAll();
}

/* ---------- REQUESTS ---------- */
function viewRequests(){
let html=`<h2>Requests</h2><button onclick="renderHome()">⬅</button>`;

currentUser.requests.forEach(r=>{
html+=`
<div class="card">
<p>@${r}</p>
<button onclick="accept('${r}')">Accept</button>
</div>`;
});

app.innerHTML=html;
}

function accept(name){
let sender=users.find(u=>u.username===name);

currentUser.followers.push(name);
sender.following.push(currentUser.username);

currentUser.requests=currentUser.requests.filter(r=>r!==name);

saveAll();
renderHome();
}

/* ---------- STORIES ---------- */
function uploadStory(e){
let file = e.target.files[0];
if(!file) return;

let url = URL.createObjectURL(file);
currentUser.stories.push({url});
saveAll();
renderHome();
}

function openStory(name,i){
let u=users.find(x=>x.username===name);
let src = u.fake ? generateStories(u)[i] : u.stories[i].url;

app.innerHTML=`
<div class="modal">
<img src="${src}" style="max-width:90%">
<button onclick="viewProfile('${name}')">Close</button>
</div>
`;
}

/* ---------- FAKE STORIES ---------- */
function generateStories(u){
if(u.bio.includes("Basketball")) return ["https://picsum.photos/200?basketball","https://picsum.photos/200?gym"];
if(u.bio.includes("Coffee")) return ["https://picsum.photos/200?coffee","https://picsum.photos/200?aesthetic"];
if(u.bio.includes("Gaming")) return ["https://picsum.photos/200?gaming","https://picsum.photos/200?setup"];
return ["https://picsum.photos/200?random"];
}

/* ---------- PRIVACY ---------- */
function togglePrivate(){
currentUser.private = !currentUser.private;
saveAll();
renderHome();
}

/* ---------- STORAGE ---------- */
function saveUsers(){localStorage.setItem("users",JSON.stringify(users));}
function saveCurrent(){localStorage.setItem("currentUser",JSON.stringify(currentUser));}
function saveAll(){saveUsers();saveCurrent();}

/* ---------- RUN ---------- */
start();
</script>

</body>
</html>
