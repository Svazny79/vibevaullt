<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeVault™</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 24px;
  background: linear-gradient(90deg,#ff00cc,#3333ff);
}

.container {
  padding: 20px;
  text-align: center;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

input {
  padding: 8px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

.userCard {
  background: #222;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

.stories img {
  width: 100px;
  border-radius: 10px;
  margin: 5px;
}
</style>
</head>

<body>

<div class="header">VibeVault™</div>
<div class="container" id="app"></div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let viewerMode = false;

/* ---------- FAKE USERS ---------- */
if (users.length === 0) {
  users = [
    {
      username: "mike123",
      password: "123",
      private: false,
      followers: [],
      following: [],
      stories: ["https://picsum.photos/200?1"]
    },
    {
      username: "lisa_vibes",
      password: "123",
      private: true,
      followers: [],
      following: [],
      stories: ["https://picsum.photos/200?2"]
    },
    {
      username: "pro_gamer",
      password: "123",
      private: false,
      followers: [],
      following: [],
      stories: ["https://picsum.photos/200?3"]
    }
  ];
  saveUsers();
}

/* ---------- START ---------- */
function renderStart() {
  const app = document.getElementById("app");

  if (!currentUser && !viewerMode) {
    app.innerHTML = `
      <h2>Welcome to VibeVault™</h2>

      <input id="username" placeholder="Username"><br>
      <input id="password" type="password" placeholder="Password"><br>

      <button onclick="signup()">Sign Up</button>
      <button onclick="login()">Login</button>

      <br><br>
      <button onclick="enterViewer()">Stay Logged Out</button>
    `;
  } else {
    renderFeed();
  }
}

/* ---------- AUTH ---------- */
function signup() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  const newUser = {
    username: u,
    password: p,
    private: false,
    followers: [],
    following: [],
    stories: []
  };

  users.push(newUser);
  currentUser = newUser;

  saveUsers();
  saveCurrentUser();

  renderFeed();
}

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  const found = users.find(x => x.username === u && x.password === p);

  if (found) {
    currentUser = found;
    saveCurrentUser();
    renderFeed();
  } else {
    alert("User not found");
  }
}

function enterViewer() {
  viewerMode = true;
  renderFeed();
}

/* ---------- FEED ---------- */
function renderFeed() {
  const app = document.getElementById("app");

  let html = `<h2>Feed</h2>`;

  if (!viewerMode) {
    html += `<p>Logged in as @${currentUser.username}</p>
             <button onclick="logout()">Logout</button>
             <button onclick="togglePrivacy()">Toggle Privacy</button>
             <br><input type="file" onchange="uploadStory(event)">`;
  } else {
    html += `<p>Viewer Mode 👀</p>
             <button onclick="location.reload()">Back</button>`;
  }

  users.forEach(u => {
    html += `
      <div class="userCard">
        <h3>@${u.username} ${u.private ? "🔒" : ""}</h3>
        ${!viewerMode && u.username !== currentUser.username ? 
          `<button onclick="followUser('${u.username}')">Follow</button>` : ""}

        <div class="stories">
          ${(!u.private || (currentUser && currentUser.following.includes(u.username))) 
            ? u.stories.map(s => `<img src="${s}">`).join("")
            : "<p>Private Account</p>"}
        </div>
      </div>
    `;
  });

  app.innerHTML = html;
}

/* ---------- ACTIONS ---------- */
function followUser(name) {
  const target = users.find(u => u.username === name);

  if (!currentUser.following.includes(name)) {
    currentUser.following.push(name);
    target.followers.push(currentUser.username);

    saveUsers();
    saveCurrentUser();

    renderFeed();
  }
}

function togglePrivacy() {
  currentUser.private = !currentUser.private;
  saveUsers();
  saveCurrentUser();
  renderFeed();
}

function uploadStory(e) {
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  currentUser.stories.push(url);

  saveUsers();
  renderFeed();
}

function logout() {
  localStorage.removeItem("currentUser");
  location.reload();
}

/* ---------- STORAGE ---------- */
function saveUsers() {
  localStorage.setItem("users", JSON.stringify(users));
}

function saveCurrentUser() {
  localStorage.setItem("currentUser", JSON.stringify(currentUser));
}

/* ---------- INIT ---------- */
renderStart();
</script>

</body>
</html>
